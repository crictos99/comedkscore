<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COMEDK Score Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#38bdf8;
}

.input-box{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:25px;
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.score{
    font-size:42px;
    color:#22c55e;
    font-weight:bold;
}

.details{
    margin-top:10px;
    color:#cbd5e1;
    line-height:1.8;
    font-size:18px;
}

.loading{
    margin-top:20px;
    text-align:center;
    color:#38bdf8;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h1>COMEDK Score Calculator</h1>

    <div class="input-box">
        <label>Upload Response Sheet PDF</label>

        <input
            type="file"
            id="pdfFile"
            accept=".pdf">
    </div>

    <button onclick="calculateScore()">
        Calculate Score
    </button>

    <div class="loading" id="loading"></div>

    <div class="result" id="result" style="display:none;">

        <div class="score" id="score">0</div>

        <div class="details" id="details"></div>

    </div>

    <div class="footer">
        Made with ♥ by Cherry Minato
    </div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function extractPDFText(pdfData){

    const pdf =
    await pdfjsLib.getDocument(pdfData).promise;

    let fullText = "";

    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);

        const textContent =
        await page.getTextContent();

        const pageText =
        textContent.items
            .map(item => item.str)
            .join(" ");

        fullText += " " + pageText;
    }

    return fullText;
}

function calculateMarks(text){

    const correct =
    (text.match(/Marks\s*:\s*1/g) || []).length;

    const totalQuestions =
    (text.match(/Q\.\d+/g) || []).length;

    const wrong =
    totalQuestions - correct;

    document.getElementById("result")
        .style.display = "block";

    document.getElementById("score")
        .innerHTML = correct;

    document.getElementById("details")
        .innerHTML = `
        Correct Answers : ${correct}<br>
        Wrong/Unscored : ${wrong}<br>
        Total Questions : ${totalQuestions}
    `;
}

async function calculateScore(){

    try{

        const file =
        document.getElementById("pdfFile").files[0];

        if(!file){

            alert("Please upload a PDF");

            return;
        }

        document.getElementById("loading")
            .innerHTML = "Reading PDF...";

        const arrayBuffer =
        await file.arrayBuffer();

        const text =
        await extractPDFText({
            data: arrayBuffer
        });

        calculateMarks(text);

        document.getElementById("loading")
            .innerHTML = "";

    }catch(err){

        console.log(err);

        alert("Error reading PDF");
    }
}

</script>

</body>
</html>
